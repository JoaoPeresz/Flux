spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flux
    username: flux_user
    password: flux_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    dev.flux: DEBUG
